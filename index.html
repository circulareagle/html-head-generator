<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- Legacy/Root Fallback -->
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

<!-- Modern PNGs -->
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/images/favicon-48x48.png">

<!-- iOS/Safari -->
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

<!-- PWA & Android -->
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#00FFFF">
    
    <title>SEO Header & Metadata Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            color: #1e293b;
        }
        .code-block {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 1.5rem;
            border-radius: 0.5rem;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            overflow-x: auto;
            white-space: pre;
            line-height: 1.5;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #475569;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.375rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #10b981;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            display: none;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900">Advanced HTML Head Generator</h1>
            <p class="text-slate-600">Generate clean, SEO-optimized metadata, social tags, and JSON-LD schema.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Input Form -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Configuration</h2>
                
                <div class="space-y-4">
                    <div class="input-group">
                        <label>Page Title</label>
                        <input type="text" id="siteTitle" placeholder="e.g. My Awesome Website" oninput="generateCode()">
                    </div>

                    <div class="input-group">
                        <label>Meta Description</label>
                        <textarea id="siteDesc" rows="2" placeholder="Brief summary of your page..." oninput="generateCode()"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>Language (ISO)</label>
                            <input type="text" id="siteLang" value="en" oninput="generateCode()">
                        </div>
                        <div class="input-group">
                            <label>Author</label>
                            <input type="text" id="siteAuthor" placeholder="John Doe" oninput="generateCode()">
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Canonical URL</label>
                        <input type="url" id="siteUrl" placeholder="https://example.com/page" oninput="generateCode()">
                    </div>

                    <div class="input-group">
                        <label>Preview Image (OG/Twitter)</label>
                        <input type="url" id="siteImage" placeholder="https://example.com/og-image.jpg" oninput="generateCode()">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="input-group">
                            <label>Twitter Handle</label>
                            <input type="text" id="siteTwitter" placeholder="@username" oninput="generateCode()">
                        </div>
                        <div class="input-group">
                            <label>Charset</label>
                            <select id="siteCharset" onchange="generateCode()">
                                <option value="UTF-8">UTF-8</option>
                                <option value="ISO-8859-1">ISO-8859-1</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                        <h3 class="text-sm font-bold text-blue-800 uppercase mb-2">Structured Data (Schema.org)</h3>
                        <div class="input-group">
                            <label class="text-blue-700">Organization Name</label>
                            <input type="text" id="schemaOrg" placeholder="Company Inc." oninput="generateCode()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Output Preview -->
            <div class="flex flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold">Generated Code</h2>
                    <button onclick="copyToClipboard()" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm transition">
                        Copy Code
                    </button>
                </div>
                
                <div id="output" class="code-block flex-grow text-xs sm:text-sm"></div>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            Ready-to-use boilerplate for professional web projects.
        </footer>
    </div>

    <div id="toast" class="toast">Code copied to clipboard!</div>

    <script>
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function generateCode() {
            const title = document.getElementById('siteTitle').value || 'Site Title';
            const desc = document.getElementById('siteDesc').value || 'Page description goes here.';
            const lang = document.getElementById('siteLang').value || 'en';
            const author = document.getElementById('siteAuthor').value || '';
            const url = document.getElementById('siteUrl').value || 'https://example.com';
            const image = document.getElementById('siteImage').value || 'https://example.com/image.jpg';
            const twitter = document.getElementById('siteTwitter').value || '@username';
            const charset = document.getElementById('siteCharset').value;
            const org = document.getElementById('schemaOrg').value || 'Organization Name';

            const schema = {
                "@context": "https://schema.org",
                "@type": "WebPage",
                "name": title,
                "description": desc,
                "publisher": {
                    "@type": "Organization",
                    "name": org
                }
            };

            const code = 
`<!-- Generated by HTML Head Generator -->
<head>
    <meta charset="${charset}">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>${title}</title>
    <meta name="title" content="${title}">
    <meta name="description" content="${desc}">
    ${author ? `<meta name="author" content="${author}">` : ''}
    <link rel="canonical" href="${url}">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="${url}">
    <meta property="og:title" content="${title}">
    <meta property="og:description" content="${desc}">
    <meta property="og:image" content="${image}">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="${url}">
    <meta property="twitter:title" content="${title}">
    <meta property="twitter:description" content="${desc}">
    <meta property="twitter:image" content="${image}">
    <meta name="twitter:site" content="${twitter}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png">

    <!-- Structured Data -->
    <script type="application/ld+json">
    ${JSON.stringify(schema, null, 4)}
    <\/script>
</head>`;

            document.getElementById('output').textContent = code;
        }

        function copyToClipboard() {
            const code = document.getElementById('output').textContent;
            const textArea = document.createElement("textarea");
            textArea.value = code;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('Fallback: Oops, unable to copy', err);
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
        }

        // Initialize
        window.onload = generateCode;
    </script>
</body>
</html>
